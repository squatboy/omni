services:
  omni:
    image: ghcr.io/squatboy/omni:${OMNI_IMAGE_TAG:?set OMNI_IMAGE_TAG}
    restart: unless-stopped
    cap_add:
      - NET_RAW
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      KUBERNETES_API_URL: ${KUBERNETES_API_URL:?set KUBERNETES_API_URL}
      KUBERNETES_BEARER_TOKEN: ${KUBERNETES_BEARER_TOKEN:?set KUBERNETES_BEARER_TOKEN}
      NODE_EXTRA_CA_CERTS: ${NODE_EXTRA_CA_CERTS:-/run/secrets/kubernetes-ca.crt}
      GITLAB_TOKEN: ${GITLAB_TOKEN:?set GITLAB_TOKEN}
      ARGOCD_TOKEN: ${ARGOCD_TOKEN:?set ARGOCD_TOKEN}
    volumes:
      - ./config/inventory.json:/app/config/inventory.json:ro
      - ./certs/kubernetes-ca.crt:/run/secrets/kubernetes-ca.crt:ro
